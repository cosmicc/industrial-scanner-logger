# Nginx site for Industrial Scanner Logger.
#
# This site proxies the API prefix and serves / from the web interface document
# root configured by the installer.

server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/scanner-site;
    index index.html index.htm;

    location = /api {
        return 308 /api/;
    }

    location = /health {
    try_files /health/index.html =404;
    }

    location /health/ {
    try_files $uri $uri/ /health/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;

        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
