# Nginx site for Industrial Scanner Logger.
#
# This site proxies the API prefix and serves / from the web interface document
# root configured by the installer.

server {
    listen @NGINX_LISTEN@;

    server_name @NGINX_SERVER_NAME@;

    root @NGINX_WEB_ROOT@;
    index index.html index.htm;

    location = @API_ROOT_PATH@ {
        return 308 @API_ROOT_PATH@/;
    }

    location = /health {
        try_files /health/index.html =404;
    }

    location /health/ {
        try_files $uri $uri/ /health/index.html;
    }

    location @API_ROOT_PATH@/ {
        proxy_pass http://@API_HOST@:@API_PORT@/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix @API_ROOT_PATH@;

        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
