<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Scan Logs</title>
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body>
  <main class="page">
    <h1>Daily Scan Logs</h1>
    <div class="subhead">
      Completed daily CSV files are available for download.
    </div>

    <section class="card">
      <h2>CSV Downloads</h2>
      <div id="logs-status" class="detail">Loading...</div>
      <div id="logs-pagination-top" class="pagination"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Filename</th>
              <th>Size</th>
              <th>Modified</th>
              <th>Download</th>
            </tr>
          </thead>
          <tbody id="logs-table">
            <tr>
              <td colspan="5">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="logs-pagination-bottom" class="pagination"></div>
    </section>

    <div class="footer">
      <a href="/">Home</a> | <a href="/health">Health Dashboard</a> | <a href="/search">Search</a> | <a href="/tv-dashboard">TV Dashboard</a>
    </div>
  </main>

  <script>
    const API_ROOT = "/api";
    const LOGS_API_URL = `${API_ROOT}/v1/logs/daily-csv`;
    const LOGS_PAGE_SIZE = 10;
    let allLogs = [];
    let currentPage = 1;

    async function loadLogs() {
      const status = document.getElementById("logs-status");
      const tbody = document.getElementById("logs-table");

      try {
        const response = await fetch(LOGS_API_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`API returned HTTP ${response.status}`);
        }

        const payload = await response.json();
        const logs = Array.isArray(payload.logs) ? payload.logs : [];
        allLogs = logs;
        currentPage = 1;
        status.textContent = `Current day excluded: ${payload.current_day_excluded || "today"}. Newest to oldest.`;
        renderLogsPage();
      } catch (error) {
        status.innerHTML = `<span class="error">Unable to load daily CSV logs.</span>`;
        tbody.innerHTML = `<tr><td colspan="5">${escapeHtml(error.message)}</td></tr>`;
        renderPagination(0);
      }
    }

    function renderLogsPage() {
      const tbody = document.getElementById("logs-table");
      const pageCount = Math.max(1, Math.ceil(allLogs.length / LOGS_PAGE_SIZE));

      currentPage = Math.min(Math.max(currentPage, 1), pageCount);
      tbody.innerHTML = "";

      if (allLogs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">No completed daily CSV files found.</td></tr>`;
        renderPagination(0);
        return;
      }

      const pageStartIndex = (currentPage - 1) * LOGS_PAGE_SIZE;
      const visibleLogs = allLogs.slice(pageStartIndex, pageStartIndex + LOGS_PAGE_SIZE);

      for (const row of visibleLogs) {
        const tr = document.createElement("tr");

        if (row.has_scans && row.download_url) {
          tr.innerHTML = `
            <td>${escapeHtml(row.scan_date || "")}</td>
            <td>${escapeHtml(row.filename || "")}</td>
            <td>${formatBytes(row.size_bytes || 0)}</td>
            <td>${escapeHtml(formatTimestamp(row.modified_at))}</td>
            <td><a class="button" href="${API_ROOT}${row.download_url}">Download CSV</a></td>
          `;
        } else {
          tr.innerHTML = `
            <td>${escapeHtml(row.scan_date || "")}</td>
            <td colspan="4" class="warning">No scans for that day.</td>
          `;
        }

        tbody.appendChild(tr);
      }

      renderPagination(pageCount);
    }

    function renderPagination(pageCount) {
      const containers = [
        document.getElementById("logs-pagination-top"),
        document.getElementById("logs-pagination-bottom")
      ];

      for (const container of containers) {
        container.innerHTML = "";

        if (pageCount <= 1) {
          continue;
        }

        const previousButton = document.createElement("button");
        previousButton.type = "button";
        previousButton.className = "button";
        previousButton.textContent = "Previous";
        previousButton.disabled = currentPage <= 1;
        previousButton.addEventListener("click", () => {
          currentPage -= 1;
          renderLogsPage();
        });

        const pageLabel = document.createElement("span");
        const start = ((currentPage - 1) * LOGS_PAGE_SIZE) + 1;
        const end = Math.min(currentPage * LOGS_PAGE_SIZE, allLogs.length);
        pageLabel.className = "pagination-label";
        pageLabel.textContent = `Page ${currentPage} of ${pageCount} (${start}-${end} of ${allLogs.length})`;

        const nextButton = document.createElement("button");
        nextButton.type = "button";
        nextButton.className = "button";
        nextButton.textContent = "Next";
        nextButton.disabled = currentPage >= pageCount;
        nextButton.addEventListener("click", () => {
          currentPage += 1;
          renderLogsPage();
        });

        container.appendChild(previousButton);
        container.appendChild(pageLabel);
        container.appendChild(nextButton);
      }
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);

      if (value < 1024) {
        return `${value} B`;
      }

      if (value < 1024 * 1024) {
        return `${(value / 1024).toFixed(1)} KB`;
      }

      return `${(value / (1024 * 1024)).toFixed(1)} MB`;
    }

    function formatTimestamp(value) {
      if (!value) {
        return "";
      }

      const parsed = new Date(value);

      if (Number.isNaN(parsed.getTime())) {
        return value;
      }

      return `${parsed.toLocaleDateString()} ${formatMeridiem(parsed)}`;
    }

    function formatMeridiem(value) {
      return value.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      }).replace(/\s?(AM|PM)$/i, (suffix) => suffix.toLowerCase());
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadLogs();
  </script>
</body>
</html>
