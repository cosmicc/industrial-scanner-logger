<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV Dashboard</title>
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body class="tv-body">
  <main class="tv-page">
    <header class="tv-header">
      <div id="tv-status" class="tv-status">CHECKING</div>
    </header>

    <div id="tv-warning" class="tv-warning" hidden></div>

    <section class="tv-rate-grid">
      <div class="tv-panel tv-rate-panel">
        <div class="tv-label">Scans Per Minute</div>
        <div id="tv-scans-minute" class="tv-value">0</div>
      </div>
      <div class="tv-panel tv-rate-panel">
        <div class="tv-label">Scans Per Hour</div>
        <div id="tv-scans-hour" class="tv-value">0</div>
      </div>
    </section>

    <section class="tv-panel tv-today-panel">
      <div class="tv-day-title">Today</div>
      <div id="tv-today-date" class="tv-date">Loading...</div>
      <div class="tv-stat-row">
        <div class="tv-stat-card">
          <div class="tv-label">Total</div>
          <div id="tv-today-total" class="tv-value">0</div>
        </div>
        <div class="tv-stat-card">
          <div class="tv-label">Successful</div>
          <div id="tv-today-success" class="tv-value success">0</div>
        </div>
        <div class="tv-stat-card">
          <div class="tv-label">Duplicates</div>
          <div id="tv-today-duplicates" class="tv-value duplicate">0</div>
        </div>
        <div class="tv-stat-card">
          <div class="tv-label">Failed</div>
          <div id="tv-today-failed" class="tv-value failed">0</div>
        </div>
      </div>
    </section>

    <section class="tv-secondary-grid">
      <div class="tv-panel">
        <div class="tv-day-title">Last Received Data</div>
        <div id="tv-last-received-time" class="tv-value">Checking</div>
        <div id="tv-last-received-detail" class="tv-date">Waiting for data</div>
      </div>

      <div class="tv-panel">
        <div class="tv-day-title">Connected Scanners</div>
        <div id="tv-connected-count" class="tv-value">0</div>
        <div id="tv-connected-detail" class="tv-date">Checking...</div>
      </div>
    </section>

  </main>

  <div id="tv-duplicate-alert" class="tv-duplicate-alert" role="alert" aria-live="assertive" hidden>
    <div class="tv-duplicate-alert-content">
      <div class="tv-duplicate-kicker">Duplicate Package</div>
      <div class="tv-duplicate-action">Remove This Package</div>
      <div class="tv-duplicate-details">
        <div>
          <div class="tv-duplicate-label">Tracking Number</div>
          <div id="tv-duplicate-barcode" class="tv-duplicate-value">----------</div>
        </div>
        <div>
          <div class="tv-duplicate-label">Scanner</div>
          <div id="tv-duplicate-scanner" class="tv-duplicate-value">Unknown</div>
        </div>
      </div>
      <div id="tv-duplicate-time" class="tv-duplicate-time">Detected now</div>
    </div>
  </div>

  <script>
    const API_URL = "/api/v1/dashboard/health";
    const DEFAULT_TV_REFRESH_SECONDS = 1;
    const DEFAULT_TV_DUPLICATE_ALERT_SECONDS = 60;
    let tvRefreshTimer = null;
    let tvRefreshIntervalMs = null;
    let activeDuplicateAlertId = null;
    let duplicateAlertTimer = null;
    let duplicateAlarmInterval = null;
    let duplicateAudioContext = null;

    async function loadDashboard() {
      try {
        const response = await fetch(API_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderDashboard(data);
      } catch (error) {
        setSystemStatus(false);
      }
    }

    function setSystemStatus(isOk) {
      const status = document.getElementById("tv-status");
      status.textContent = isOk ? "SYSTEM OK" : "SYSTEM PROBLEM";
      status.classList.toggle("offline", !isOk);
    }

    function renderDashboard(data) {
      const rate = data.current_scan_rate || {};
      const totals = data.daily_totals || {};
      const today = totals.today || {};
      const mandatoryScanners = data.mandatory_scanners || {};
      const warning = document.getElementById("tv-warning");

      setSystemStatus(data.status === "ok");
      configureTvRefresh(data.tv_dashboard_refresh_seconds);

      if (mandatoryScanners.warning) {
        warning.hidden = false;
        warning.textContent = mandatoryScanners.warning;
      } else {
        warning.hidden = true;
        warning.textContent = "";
      }

      setText("tv-scans-minute", formatNumber(rate.scans_per_minute));
      setText("tv-scans-hour", formatNumber(rate.scans_per_hour));

      setText("tv-today-date", today.scan_date || "");
      setText("tv-today-total", formatNumber(today.total_scan_events));
      setText("tv-today-success", formatNumber(today.successful_scans));
      setText("tv-today-duplicates", formatNumber(today.duplicate_scans));
      setText("tv-today-failed", formatNumber(today.failed_scans));

      renderDuplicateAlert(
        data.tv_duplicate_alert_enabled !== false,
        data.duplicate_alert,
        data.tv_duplicate_alert_seconds || DEFAULT_TV_DUPLICATE_ALERT_SECONDS
      );
      renderLastReceived(data.last_received);
      renderConnectedScanners(data);
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function renderLastReceived(lastReceived) {
      if (!lastReceived) {
        setText("tv-last-received-time", "No Data");
        setText("tv-last-received-detail", "No scan rows found.");
        return;
      }

      setText(
        "tv-last-received-time",
        formatElapsedTime(lastReceived.scan_date, lastReceived.scan_time)
      );
      setText(
        "tv-last-received-detail",
        formatScanDateTime(lastReceived.scan_date, lastReceived.scan_time)
      );
    }

    function renderConnectedScanners(data) {
      const connectedIds = data.connected_scanner_ids || [];
      const connectedCount = Number(data.connected_scanner_count ?? connectedIds.length);
      const mandatoryScanners = data.mandatory_scanners || {};

      setText("tv-connected-count", formatNumber(connectedCount));

      if (mandatoryScanners.warning) {
        setText("tv-connected-detail", mandatoryScanners.warning);
        document.getElementById("tv-connected-detail").classList.add("warning");
        return;
      }

      document.getElementById("tv-connected-detail").classList.remove("warning");

      if (mandatoryScanners.configured) {
        const labels = mandatoryScannerLabels(mandatoryScanners);
        setText(
          "tv-connected-detail",
          labels.length > 0
            ? `Mandatory scanners connected: ${labels.join(", ")}.`
            : "All mandatory scanners connected."
        );
        return;
      }

      setText("tv-connected-detail", "No mandatory scanners configured.");
    }

    function mandatoryScannerLabels(mandatoryScanners) {
      if (Array.isArray(mandatoryScanners?.required_scanners)) {
        return mandatoryScanners.required_scanners
          .map(scannerDisplayName)
          .filter(Boolean);
      }

      return (mandatoryScanners?.required_scanner_ids || [])
        .map((scannerId) => `Scanner ${scannerId}`)
        .filter(Boolean);
    }

    function scannerDisplayName(row) {
      if (row.display_name) {
        return row.display_name;
      }

      if (row.scanner_name) {
        return row.scanner_name;
      }

      if (
        row.scanner_id !== undefined &&
        row.scanner_id !== null &&
        row.scanner_id !== ""
      ) {
        return `Scanner ${row.scanner_id}`;
      }

      return "";
    }

    function renderDuplicateAlert(enabled, alert, configuredSeconds) {
      if (!enabled || !alert) {
        hideDuplicateAlert();
        return;
      }

      const alertId = String(
        alert.id ?? `${alert.scan_date || ""}-${alert.scan_time || ""}-${alert.barcode || ""}`
      );
      const remainingSeconds = Number(
        alert.alert_remaining_seconds || configuredSeconds || DEFAULT_TV_DUPLICATE_ALERT_SECONDS
      );
      const displaySeconds = Number.isFinite(remainingSeconds) && remainingSeconds > 0
        ? remainingSeconds
        : DEFAULT_TV_DUPLICATE_ALERT_SECONDS;
      const overlay = document.getElementById("tv-duplicate-alert");
      const barcodeDigits = alert.tracking_number || alert.barcode_last_12 || lastDigits(
        alert.barcode || alert.tracking_number || "",
        12
      );
      const scannerName = scannerDisplayName(alert) || "Unknown Scanner";

      setText("tv-duplicate-barcode", barcodeDigits || "Unknown");
      setText("tv-duplicate-scanner", scannerName);
      setText(
        "tv-duplicate-time",
        `Detected ${formatScanDateTime(alert.scan_date, alert.scan_time) || "now"}`
      );

      overlay.hidden = false;
      document.body.classList.add("tv-alert-active");

      if (activeDuplicateAlertId !== alertId) {
        activeDuplicateAlertId = alertId;
      }

      startDuplicateAlarm();

      if (duplicateAlertTimer) {
        window.clearTimeout(duplicateAlertTimer);
      }

      duplicateAlertTimer = window.setTimeout(
        hideDuplicateAlert,
        Math.max(1000, displaySeconds * 1000)
      );
    }

    function hideDuplicateAlert() {
      const overlay = document.getElementById("tv-duplicate-alert");

      if (overlay) {
        overlay.hidden = true;
      }

      document.body.classList.remove("tv-alert-active");
      activeDuplicateAlertId = null;

      if (duplicateAlertTimer) {
        window.clearTimeout(duplicateAlertTimer);
        duplicateAlertTimer = null;
      }

      stopDuplicateAlarm();
    }

    function startDuplicateAlarm() {
      if (duplicateAlarmInterval) {
        return;
      }

      playDuplicateBeep();
      duplicateAlarmInterval = window.setInterval(playDuplicateBeep, 900);
    }

    function stopDuplicateAlarm() {
      if (duplicateAlarmInterval) {
        window.clearInterval(duplicateAlarmInterval);
        duplicateAlarmInterval = null;
      }
    }

    function playDuplicateBeep() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) {
        return;
      }

      try {
        if (!duplicateAudioContext) {
          duplicateAudioContext = new AudioContextClass();
        }

        if (duplicateAudioContext.state === "suspended") {
          duplicateAudioContext.resume().catch(() => {});
        }

        const now = duplicateAudioContext.currentTime;
        const oscillator = duplicateAudioContext.createOscillator();
        const gain = duplicateAudioContext.createGain();

        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(740, now);
        oscillator.frequency.setValueAtTime(1040, now + 0.22);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.7, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);

        oscillator.connect(gain);
        gain.connect(duplicateAudioContext.destination);
        oscillator.start(now);
        oscillator.stop(now + 0.65);
        oscillator.onended = () => {
          oscillator.disconnect();
          gain.disconnect();
        };
      } catch (_error) {
        stopDuplicateAlarm();
      }
    }

    function lastDigits(value, digitCount) {
      return String(value || "").replace(/\D/g, "").slice(-digitCount);
    }

    function formatNumber(value) {
      const numericValue = Number(value || 0);

      if (!Number.isFinite(numericValue)) {
        return "0";
      }

      return numericValue.toLocaleString(undefined, {
        maximumFractionDigits: 2,
      });
    }

    function configureTvRefresh(refreshSeconds) {
      const intervalMs = refreshIntervalMs(refreshSeconds, DEFAULT_TV_REFRESH_SECONDS);

      if (tvRefreshTimer && intervalMs === tvRefreshIntervalMs) {
        return;
      }

      if (tvRefreshTimer) {
        window.clearInterval(tvRefreshTimer);
      }

      tvRefreshIntervalMs = intervalMs;
      tvRefreshTimer = window.setInterval(loadDashboard, intervalMs);
    }

    function refreshIntervalMs(value, defaultSeconds) {
      const seconds = Number(value || defaultSeconds);

      if (!Number.isFinite(seconds) || seconds <= 0) {
        return defaultSeconds * 1000;
      }

      return Math.max(1000, seconds * 1000);
    }

    function formatElapsedTime(scanDate, scanTime, now = new Date()) {
      if (!scanDate || !scanTime) {
        return "Unknown";
      }

      const scanDateTime = new Date(`${scanDate}T${scanTime}`);

      if (Number.isNaN(scanDateTime.getTime())) {
        return "Unknown";
      }

      return formatElapsedSince(scanDateTime, 10, now);
    }

    function formatElapsedSince(value, nowThresholdSeconds, now = new Date()) {
      const elapsedSeconds = Math.max(
        0,
        Math.floor((now.getTime() - value.getTime()) / 1000)
      );

      if (elapsedSeconds <= nowThresholdSeconds) {
        return "Now";
      }

      if (elapsedSeconds <= 1) {
        return "1 Second ago";
      }

      const units = [
        {
          label: "Week",
          seconds: 7 * 24 * 60 * 60,
          thresholdSeconds: 4 * 7 * 24 * 60 * 60
        },
        {
          label: "Day",
          seconds: 24 * 60 * 60,
          thresholdSeconds: 24 * 60 * 60
        },
        {
          label: "Hour",
          seconds: 60 * 60,
          thresholdSeconds: 60 * 60
        },
        {
          label: "Minute",
          seconds: 60,
          thresholdSeconds: 60
        },
        {
          label: "Second",
          seconds: 1,
          thresholdSeconds: 0
        }
      ];

      for (let index = 0; index < units.length; index += 1) {
        const primary = units[index];

        if (elapsedSeconds < primary.thresholdSeconds) {
          continue;
        }

        const primaryValue = Math.floor(elapsedSeconds / primary.seconds);
        const parts = [formatElapsedPart(primaryValue, primary.label)];
        const secondary = units[index + 1];

        if (secondary && primary.label !== "Second") {
          const remainder = elapsedSeconds % primary.seconds;
          const secondaryValue = Math.floor(remainder / secondary.seconds);

          if (secondaryValue > 0) {
            parts.push(formatElapsedPart(secondaryValue, secondary.label));
          }
        }

        return `${parts.join(", ")} ago`;
      }

      return "Now";
    }

    function formatElapsedPart(value, label) {
      return `${value.toLocaleString()} ${label}${value === 1 ? "" : "s"}`;
    }

    function formatScanDateTime(scanDate, scanTime) {
      if (!scanDate && !scanTime) {
        return "";
      }

      const parsed = parseScanDateTime(scanDate, scanTime);

      if (!parsed) {
        return `${scanDate || ""} ${scanTime || ""}`.trim();
      }

      return `${scanDate || parsed.toLocaleDateString()} ${formatMeridiem(parsed)}`;
    }

    function parseScanDateTime(scanDate, scanTime) {
      if (!scanTime) {
        return null;
      }

      const datePart = scanDate || "1970-01-01";
      const normalizedTime = String(scanTime).replace(/(\.\d{3})\d+$/, "$1");
      const parsed = new Date(`${datePart}T${normalizedTime}`);

      if (Number.isNaN(parsed.getTime())) {
        return null;
      }

      return parsed;
    }

    function formatMeridiem(value) {
      return value.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      }).replace(/\s?(AM|PM)$/i, (suffix) => suffix.toLowerCase());
    }

    loadDashboard();
    configureTvRefresh(DEFAULT_TV_REFRESH_SECONDS);
  </script>
</body>
</html>
